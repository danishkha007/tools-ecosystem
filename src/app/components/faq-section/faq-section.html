<div class="faq-section" [style.--accent-color]="accentColor">
    <h2>{{ title }}</h2>
    <div class="faq-accordion">
        @for (faq of faqs; track faq; let i = $index) {
            <div class="faq-item" [class.expanded]="expandedIndex === i">
                <button class="faq-question" (click)="toggleFaq(i)">
                    <span>{{ faq.question }}</span>
                    <svg class="faq-icon" [class.rotated]="expandedIndex === i" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="faq-answer" [class.show]="expandedIndex === i">
                    <p>{{ faq.answer }}</p>
                </div>
            </div>
        }
    </div>
</div>
