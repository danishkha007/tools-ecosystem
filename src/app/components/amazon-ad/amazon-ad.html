<!-- Amazon Associates Ad Banner -->
<div class="amazon-ad-container" [class]="containerClass">
  <div class="amazon-ad-wrapper">
    <span class="amazon-ad-disclosure">Ad</span>
    <a [href]="amazonLink" target="_blank" rel="noopener noreferrer" class="amazon-ad-link">
      <!-- 720x90 Leaderboard Layout -->
      <div class="amazon-ad-content leaderboard-layout" *ngIf="size === '720x90'">
        <div class="amazon-brand-section">
          <div class="amazon-logo-wrapper">
            <img src="/amazon-logo.png" alt="Amazon" class="amazon-logo-image" />
            <!-- <span class="amazon-smile-arrow">→</span> -->
          </div>
        </div>
        <div class="amazon-divider"></div>
        <div class="amazon-message-section">
          <div class="amazon-headlines">
            <span class="amazon-main-title">Discover Amazing Deals</span>
            <span class="amazon-sub-title">Shop millions of products</span>
          </div>
          <div class="amazon-cta-button">
            <span>Shop Now</span>
            <span class="cta-arrow">›</span>
          </div>
        </div>
        <div class="amazon-badges">
          <div class="badge prime-badge">
            <span class="prime-text">prime</span>
          </div>
          <div class="badge delivery-badge">
            <span class="delivery-text">Fast Delivery</span>
          </div>
        </div>
      </div>

      <!-- 350x350 Square Layout -->
      <div class="amazon-ad-content square-layout" *ngIf="size === '350x350'">
        <div class="square-header">
          <div class="amazon-logo-wrapper">
            <img src="/amazon-logo.png" alt="Amazon" class="amazon-logo-image" />
            <!-- <span class="amazon-smile-arrow">→</span> -->
          </div>
          <div class="sparkles-container">
            <span class="sparkle">✦</span>
            <span class="sparkle">✦</span>
            <span class="sparkle">✦</span>
          </div>
        </div>
        <div class="square-body">
          <div class="promo-text-section">
            <span class="promo-headline">Huge Savings</span>
            <span class="promo-subline">Await You!</span>
          </div>
          <div class="features-grid">
            <div class="feature-item">
              <span class="feature-icon">🚚</span>
              <span class="feature-label">Free Shipping</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon">↩️</span>
              <span class="feature-label">Easy Returns</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon">🔒</span>
              <span class="feature-label">Secure Payment</span>
            </div>
          </div>
        </div>
        <div class="square-footer">
          <div class="cta-button">
            <span>Shop on Amazon</span>
            <span class="button-arrow">→</span>
          </div>
        </div>
      </div>
    </a>
  </div>
</div>
