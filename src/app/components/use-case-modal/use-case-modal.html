<div *ngIf="isOpen" class="use-case-modal-overlay" (click)="onOverlayClick($event)">
    <div class="use-case-modal-content" (click)="$event.stopPropagation()">
        <button class="use-case-modal-close" (click)="onClose()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <div class="use-case-modal-icon" [style.background]="useCase?.color">
            <svg  width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" [style.color]="useCase?.iconColor">
                <path [attr.d]="useCase?.icon"  stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h3 class="use-case-modal-title">{{ useCase?.title }}</h3>
        <p class="use-case-modal-description">{{ useCase?.description }}</p>
        <div class="use-case-modal-benefits" *ngIf="useCase?.benefits?.length">
            <h4>What you can do:</h4>
            <ul>
                <li *ngFor="let benefit of useCase?.benefits">{{ benefit }}</li>
            </ul>
        </div>
        <div class="use-case-modal-cta">
            <button class="cta-button" (click)="onClose()">Try It Now</button>
        </div>
    </div>
</div>
