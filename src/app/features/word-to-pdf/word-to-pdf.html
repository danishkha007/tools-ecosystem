        <div *ngIf="loading && converting" class="overall-progress">
            <div class="progress-header">
                <span class="progress-label">Converting to PDF</span>
                <span class="progress-percent">{{ progressValue | number:'1.0-0' }}%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" [class.complete]="progressComplete" [style.width.%]="progressValue"></div>
            </div>
        </div>

        Comment: Controls
        <div class="controls controls-grouped">
            <label class="add-more-btn" for="fileInput" [class.disabled]="converting">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5V19M5 12H19"/>
                </svg>
                Add More Files
            </label>
            <button class="convert-btn" (click)="convertToPdf()" [disabled]="loading || converting">
                <svg *ngIf="!loading" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6A2 2 0 0 0 4 4V20A2 2 0 0 0 6 22H18A2 2 0 0 0 20 20V8L14 2Z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span *ngIf="!loading && !converting">Convert to PDF</span>
                <span *ngIf="loading || converting" class="loading-text">
                    <span class="spinner"></span>
                    Converting...
                </span>
            </button>
            <button *ngIf="convertedUrl && !loading && !converting" class="download-btn" (click)="downloadConverted()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download PDF
            </button>
        </div>

        <div *ngIf="convertMessage && !loading && !converting" class="convert-message" [class.success]="convertedUrl">
            {{ convertMessage }}
        </div>
    </div>

    <input id="fileInput" type="file" multiple accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" (change)="onFileSelect($event)" hidden />
